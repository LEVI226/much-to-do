name: Deploy Backend → GCE MIG Rolling Update

on:
  push:
    branches: [main]
    paths:
      - 'Server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Run Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: Server/MuchToDo/go.mod
          cache-dependency-path: Server/MuchToDo/go.sum
      - name: Run unit tests
        working-directory: Server/MuchToDo
        run: go test ./... -v -short

  deploy:
    name: Rolling deploy to MIG via IAP
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger MIG rolling instance refresh
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          REGION="${{ secrets.GCP_REGION }}"
          MIG="${{ secrets.MIG_NAME }}"

          echo "=== Triggering rolling replace on $MIG ==="
          gcloud compute instance-groups managed rolling-action replace "$MIG" \
            --region="$REGION" \
            --project="$PROJECT" \
            --max-surge=2 \
            --max-unavailable=0

          echo "=== Waiting for update to complete ==="
          gcloud compute instance-groups managed wait-until "$MIG" \
            --version-target-reached \
            --region="$REGION" \
            --project="$PROJECT" \
            --timeout=300

          echo "=== Waiting 30s for app startup ==="
          sleep 30

          echo "=== Health check ==="
          HTTP=$(curl -sk -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_API_BASE_URL }}/health" || echo "000")
          echo "HTTP $HTTP"
          [ "$HTTP" = "200" ] && echo "Deploy successful" || { echo "Health check failed: $HTTP"; exit 1; }
