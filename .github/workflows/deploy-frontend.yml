name: Deploy Frontend → S3 + CloudFront

on:
  push:
    branches: [main]
    paths:
      - 'Client/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build React SPA and deploy to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        working-directory: Client
        run: npm ci

      - name: Build SPA
        working-directory: Client
        env:
          VITE_API_BASE_URL: http://${{ secrets.ALB_DNS_NAME }}
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        working-directory: Client
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }}             --delete             --cache-control "public,max-age=31536000,immutable"             --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html             --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          ID=$(aws cloudfront create-invalidation             --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}             --paths "/*" --query Invalidation.Id --output text)
          aws cloudfront wait invalidation-completed             --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --id "$ID"
          echo "✅ Frontend deployed!"
