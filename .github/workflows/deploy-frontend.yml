name: "Deploy Frontend — S3 + CloudFront"

on:
  push:
    branches: [main]
    paths:
      - "Client/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  deploy-frontend:
    name: "Build & Deploy React SPA"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Client/package-lock.json

      - name: Install Dependencies
        working-directory: Client
        run: npm ci

      - name: Build
        working-directory: Client
        env:
          # Injects the ALB DNS name as the API base URL at build time
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        working-directory: Client
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --delete \
            --cache-control "max-age=31536000,public,immutable" \
            --exclude "index.html"

          # index.html must not be cached so users always get the latest version
          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
