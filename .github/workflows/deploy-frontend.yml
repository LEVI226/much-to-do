name: Deploy Frontend → GCS + Cloud CDN

on:
  push:
    branches: [main]
    paths:
      - 'Client/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build React SPA and deploy to GCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        working-directory: Client
        run: npm ci

      - name: Build SPA
        working-directory: Client
        env:
          VITE_API_BASE_URL: http://${{ secrets.LB_IP }}
        run: npm run build

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Sync build artifacts to GCS
        working-directory: Client
        run: |
          gsutil -m rsync -r -d -x "^index.html$"             dist/ gs://${{ secrets.GCS_FRONTEND_BUCKET }}/
          gsutil -m setmeta             -h "Cache-Control:public,max-age=31536000,immutable"             "gs://${{ secrets.GCS_FRONTEND_BUCKET }}/**" 2>/dev/null || true
          gsutil cp             -h "Cache-Control:no-cache,no-store,must-revalidate"             -h "Content-Type:text/html"             dist/index.html             gs://${{ secrets.GCS_FRONTEND_BUCKET }}/index.html

      - name: Invalidate Cloud CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache             ${{ secrets.CDN_URL_MAP_NAME }}             --path "/*"             --project ${{ secrets.GCP_PROJECT_ID }}             --async
          echo "✅ Frontend deployed!"
