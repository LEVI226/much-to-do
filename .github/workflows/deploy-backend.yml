name: "Deploy Backend — Rolling Update to EC2"

on:
  push:
    branches: [main]
    paths:
      - "Server/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  APP_DIR: /opt/muchtodo

jobs:
  build:
    name: "Build Go Binary"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: Server/MuchToDo/go.sum

      - name: Build Linux Binary
        working-directory: Server/MuchToDo
        run: |
          GOOS=linux GOARCH=amd64 go build -o ../../muchtodo-server ./cmd/api/

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: muchtodo-server
          path: muchtodo-server
          retention-days: 1

  deploy:
    name: "Rolling Deploy to EC2"
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Add additional instance IPs as secrets: EC2_HOST_1, EC2_HOST_2
        host: ["EC2_HOST_1", "EC2_HOST_2"]
      max-parallel: 1  # rolling: one instance at a time

    steps:
      - name: Download Binary
        uses: actions/download-artifact@v4
        with:
          name: muchtodo-server

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM (no SSH keys needed)
        env:
          INSTANCE_ID: ${{ secrets[matrix.host] }}
        run: |
          chmod +x muchtodo-server

          # Upload binary to S3 staging area
          aws s3 cp muchtodo-server \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/deploy/muchtodo-server

          # Run deployment commands on the EC2 instance via SSM
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp s3://${{ secrets.S3_FRONTEND_BUCKET }}/deploy/muchtodo-server /opt/muchtodo/server.new",
              "chmod +x /opt/muchtodo/server.new",
              "systemctl stop muchtodo",
              "mv /opt/muchtodo/server.new /opt/muchtodo/server",
              "systemctl start muchtodo",
              "sleep 5",
              "systemctl is-active muchtodo"
            ]' \
            --query "Command.CommandId" \
            --output text)

          # Wait for command to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          # Check result
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          echo "Deployment status for $INSTANCE_ID: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1

      - name: Health Check
        env:
          ALB_DNS: ${{ secrets.ALB_DNS_NAME }}
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 "http://$ALB_DNS/ping" | grep -q "pong"
          echo "Health check passed"
