name: Deploy Backend → GCE Rolling Update

on:
  push:
    branches: [main]
    paths:
      - 'Server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: Server/MuchToDo/go.sum
      - run: go test ./... -v -short
        working-directory: Server/MuchToDo

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy → Instance 1
        run: |
          gcloud compute ssh ${{ secrets.GCE_INSTANCE_1 }}             --zone=${{ secrets.GCE_ZONE_1 }}             --project=${{ secrets.GCP_PROJECT_ID }}             --tunnel-through-iap             --quiet             --command="
              set -e
              cd /opt/much-to-do/repo
              git fetch origin main
              git reset --hard origin/main
              cd Server/MuchToDo
              HOME=/root go build -o /opt/much-to-do/server ./cmd/api/
              sudo systemctl restart much-to-do
              sleep 5
              systemctl is-active much-to-do
            "

      - name: Health check
        run: sleep 15 && curl -sf "http://${{ secrets.LB_IP }}/health" || true

      - name: Deploy → Instance 2
        run: |
          gcloud compute ssh ${{ secrets.GCE_INSTANCE_2 }}             --zone=${{ secrets.GCE_ZONE_2 }}             --project=${{ secrets.GCP_PROJECT_ID }}             --tunnel-through-iap             --quiet             --command="
              set -e
              cd /opt/much-to-do/repo
              git fetch origin main
              git reset --hard origin/main
              cd Server/MuchToDo
              HOME=/root go build -o /opt/much-to-do/server ./cmd/api/
              sudo systemctl restart much-to-do
            "
          echo "✅ Rolling deployment complete!"
