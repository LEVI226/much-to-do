name: Deploy Backend → EC2 Rolling Update

on:
  push:
    branches: [main]
    paths:
      - 'Server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: Server/MuchToDo/go.sum
      - run: go test ./... -v -short
        working-directory: Server/MuchToDo

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy → Instance 1
        run: |
          CMD=$(aws ssm send-command             --instance-ids "${{ secrets.EC2_HOST_1 }}"             --document-name "AWS-RunShellScript"             --parameters 'commands=["cd /opt/muchtodo/repo && git fetch origin main && git reset --hard origin/main && cd Server/MuchToDo && GOPATH=/opt/muchtodo/go go build -o /opt/muchtodo/server ./cmd/api/ && systemctl restart muchtodo"]'             --timeout-seconds 300 --query "Command.CommandId" --output text)
          aws ssm wait command-executed --command-id "$CMD" --instance-id "${{ secrets.EC2_HOST_1 }}"

      - name: Health check
        run: sleep 15 && curl -sf "http://${{ secrets.ALB_DNS_NAME }}/ping" || true

      - name: Deploy → Instance 2
        run: |
          CMD=$(aws ssm send-command             --instance-ids "${{ secrets.EC2_HOST_2 }}"             --document-name "AWS-RunShellScript"             --parameters 'commands=["cd /opt/muchtodo/repo && git fetch origin main && git reset --hard origin/main && cd Server/MuchToDo && GOPATH=/opt/muchtodo/go go build -o /opt/muchtodo/server ./cmd/api/ && systemctl restart muchtodo"]'             --timeout-seconds 300 --query "Command.CommandId" --output text)
          aws ssm wait command-executed --command-id "$CMD" --instance-id "${{ secrets.EC2_HOST_2 }}"
          echo "✅ Rolling deployment complete!"
