name: Deploy Backend → GCE MIG Rolling Update

on:
  push:
    branches: [main]
    paths:
      - 'Server/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Run Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: Server/MuchToDo/go.mod
          cache-dependency-path: Server/MuchToDo/go.sum
      - name: Run unit tests
        working-directory: Server/MuchToDo
        run: go test ./... -v -short

  deploy:
    name: Rolling deploy to MIG via IAP
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger MIG rolling instance refresh
        run: |
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          REGION="${{ secrets.GCP_REGION }}"
          MIG="${{ secrets.MIG_NAME }}"

          echo "=== Triggering rolling instance refresh on $MIG ==="
          gcloud compute instance-groups managed rolling-action replace "$MIG" \
            --region="$REGION" \
            --project="$PROJECT" \
            --max-surge=2 \
            --max-unavailable=0

          echo "=== Waiting for rolling update to complete (up to 5 min) ==="
          gcloud compute instance-groups managed wait-until "$MIG" \
            --version-target-reached \
            --region="$REGION" \
            --project="$PROJECT" \
            --timeout=300

          echo "=== Waiting 30s for app startup ==="
          sleep 30

          echo "=== Checking backend health via Load Balancer ==="
          HTTP=$(curl -sk -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_API_BASE_URL }}/health" || echo "000")
          echo "Health check HTTP status: $HTTP"

          if [ "$HTTP" = "200" ]; then
            echo "Deploy successful — backend is healthy"
          else
            echo "Health check returned $HTTP — waiting 30s more..."
            sleep 30
            HTTP2=$(curl -sk -o /dev/null -w "%{http_code}" \
              "${{ secrets.VITE_API_BASE_URL }}/health" || echo "000")
            [ "$HTTP2" = "200" ] && echo "Deploy successful on retry" || \
              { echo "Health check failed"; exit 1; }
          fi

          echo "Rolling deploy complete!"
